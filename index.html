<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon École</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f5f8;
}

header{
    background:#0b7bdc;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    display:flex;
}

.menu{
    width:220px;
    background:white;
    height:100vh;
    box-shadow:2px 0 8px rgba(0,0,0,.1);
}

.menu h3{
    text-align:center;
    color:#0b7bdc;
}

.menu button{
    width:90%;
    margin:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#e7f2ff;
    cursor:pointer;
    font-size:16px;
}

.menu button:hover{
    background:#cfe6ff;
}

.content{
    flex:1;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#0b7bdc;
    color:white;
}
</style>

</head>
<body>

<header>

<p>Espace Enseignant</p>
</header>

<div class="container">

<div class="menu">

<button onclick="alert('Faire l’appel')">📋 Appel</button>

</div>

<div class="content">

</tr>
