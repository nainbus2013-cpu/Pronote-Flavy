<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRONOTE Collège</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#eef3f8;
color:#222;
}

header{
background:#008060;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}

#connexion{
width:350px;
margin:80px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #aaa;
text-align:center;
}

input,button{
padding:12px;
margin:8px;
border-radius:10px;
border:none;
}

input{
width:90%;
border:1px solid #ccc;
}

button{
background:#008060;
color:white;
cursor:pointer;
}

#app{
display:none;
}

#menu{
position:fixed;
right:20px;
top:80px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px #aaa;
}

#contenu{
padding:20px;
}

.carte{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
box-shadow:0 0 10px #ccc;
}


.eleve{
display:inline-block;
width:120px;
height:130px;
background:#fff;
margin:8px;
border-radius:15px;
text-align:center;
padding:10px;
box-shadow:0 2px 8px #bbb;
}

.monstre{
font-size:40px;
}

.badge{
background:#087d3b;
color:white;
border-radius:50%;
padding:6px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #aaa;
padding:10px;
}

#sonnerieBox{
display:none;
}


</style>

</head>


<body>


<header>
PRONOTE - Collège
<span style="float:right">
👨‍🏫 M. Leroy
</span>
</header>


<div id="connexion">

<h2>Connexion</h2>

<input id="id" placeholder="Identifiant">

<input id="mdp" type="password" placeholder="Mot de passe">

<br>

<button onclick="connexion()">Entrer</button>

</div>



<div id="app">


<div id="menu">

<button onclick="ouvrirSonnerie()">🔔 Sonnerie</button>

</div>



<div id="contenu">


<div class="carte">

<h2>
Bienvenue M. Leroy 👨‍🏫
</h2>


<button onclick="changerClasse('6A')">
6e A
</button>


<button onclick="changerClasse('6B')">
6e B
</button>


</div>



<div class="carte">

<h2>👨‍🎓 Élèves</h2>

<div id="eleves"></div>

<br>

<button onclick="ajouterEleve()">
➕ Ajouter un élève
</button>


</div>



<div class="carte">

<h2>📞 Appel</h2>

<div id="appel"></div>


</div>


<div class="carte">

<h2>📝 Notes</h2>

<button onclick="ajouterNote()">
Ajouter une note
</button>

<div id="notes"></div>


</div>


<div class="carte">

<h2>📅 Emploi du temps</h2>


<table>

<tr>
<th>Heure</th>
<th>Lundi</th>
<th>Mardi</th>
<th>Jeudi</th>
<th>Vendredi</th>
</tr>


<tr>
<td>8h</td>
<td contenteditable>Maths</td>
<td contenteditable>Français</td>
<td contenteditable>Histoire</td>
<td contenteditable>Sport</td>
</tr>


<tr>
<td>10h</td>
<td contenteditable>SVT</td>
<td contenteditable>Anglais</td>
<td contenteditable>Arts</td>
<td contenteditable>Techno</td>
</tr>


</table>


</div>



<div id="sonnerieBox" class="carte">

<h2>🔔 Sonnerie</h2>

<button onclick="sonner()">
Sonner maintenant
</button>


<br>


<input id="minutes" placeholder="Minutes">


<button onclick="minuteur()">
Lancer minuteur
</button>


<br>


<button onclick="stopSon()">
Arrêter
</button>


</div>



</div>

</div>
<script>

const LOGIN="t.leroy346";
const PASSWORD="Théoleroy2013*";


let classeActuelle="6A";


let classes={

"6A":[
"Bina Charlotte",
"Boudma Charlie",
"Bounette Lilio",
"Deparis Lina",
"Dupont Tibo",
"Gérard Lalie",
"Jean Ilan",
"Langlet Agathe",
"Leroi Lylan",
"Lila Gaëtan",
"Malie Louanne",
"Marchandi Lylah",
"Pade Victorine",
"Rouale Corentin",
"Thiebots Lily",
"Winlaie Luna"
],


"6B":[
"Caron Sophia",
"Carpentier Gabin",
"Carpentier Zoé",
"Dupuis Ismaël",
"Fontaine Jade",
"Gréjin Hantoine",
"Harmant Antoine",
"Lambert Aya",
"Lefevre Adams",
"Lefevre Estebane",
"Lefevre Mathis",
"Lenoï Flin"
]

};



let notes=[];

let audio=null;

let timer=null;




function connexion(){


let id=document.getElementById("id").value;

let mdp=document.getElementById("mdp").value;



if(id===LOGIN && mdp===PASSWORD){


document.getElementById("connexion").style.display="none";

document.getElementById("app").style.display="block";


afficherEleves();


}

else{


alert("Identifiant incorrect");

}


}





function changerClasse(c){


classeActuelle=c;

afficherEleves();


}




function afficherEleves(){


let zone=document.getElementById("eleves");


zone.innerHTML="";


classes[classeActuelle].forEach((nom,i)=>{


zone.innerHTML+=`

<div class="eleve">

<div class="monstre">👾</div>

<b>${nom}</b>

<br>

<span class="badge">${i+1}</span>


<br><br>


<button onclick="supprimerEleve(${i})">
❌
</button>


</div>


`;


});


faireAppel();


}




function ajouterEleve(){


let nom=prompt(
"Nom de l'élève :"
);


if(nom){


classes[classeActuelle].push(nom);


afficherEleves();


}


}




function supprimerEleve(i){


if(confirm("Supprimer cet élève ?")){


classes[classeActuelle].splice(i,1);


afficherEleves();


}


}





function faireAppel(){


let zone=document.getElementById("appel");


zone.innerHTML="";


classes[classeActuelle].forEach(nom=>{


zone.innerHTML+=`

<p>

${nom}

<select>

<option>Présent</option>

<option>Absent</option>

</select>


</p>


`;


});


}






function ajouterNote(){


let eleve=prompt("Élève");

let matiere=prompt("Matière");

let note=prompt("Note /20");



if(eleve && matiere && note){


notes.push(
`${eleve} - ${matiere} : ${note}/20`
);


afficherNotes();


}


}




function afficherNotes(){


document.getElementById("notes").innerHTML=
notes.map(n=>"<p>"+n+"</p>").join("");


}





function ouvrirSonnerie(){


let box=document.getElementById("sonnerieBox");


box.style.display =
box.style.display==="block"
?"none"
:"block";


}





function sonner(){


if(audio){
audio.pause();
}


audio=new Audio(
"https://actions.google.com/sounds/v1/alarms/school_bell.ogg"
);


audio.play();


}




function stopSon(){


if(audio){

audio.pause();

audio.currentTime=0;

}


clearTimeout(timer);


}




function minuteur(){


let m=
document.getElementById("minutes").value;


if(!m){

alert("Mets un nombre de minutes");

return;

}



timer=setTimeout(()=>{


sonner();


},m*60000);



alert(
"Sonnerie dans "+m+" minutes"
);



}



</script>
</body>
</html>
